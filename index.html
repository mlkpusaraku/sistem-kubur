<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carian Maklumat Kubur Negeri Melaka</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<style>
body { font-family: Arial; background:#f4f6f8; margin:0; font-size:12px; }
.header { background:#0d3b66; color:white; padding:10px; text-align:center; font-size:16px; }

.searchbox { background:white; padding:10px; text-align:center; margin:10px auto; width:95%; }
.searchbox input, .searchbox select { padding:6px; font-size:12px; }

#resultCount { width:95%; margin:auto; font-weight:bold; color:#0d3b66; }

table { width:95%; margin:10px auto; font-size:11px; }
th { background:#0d3b66; color:white; }

.mapbtn { background:#0d3b66; color:white; padding:3px 6px; border-radius:4px; text-decoration:none; }

#map { width:95%; height:400px; margin:20px auto; border:2px solid #0d3b66; }

.dataTables_empty { text-align:center !important; color:#666; }
</style>
</head>

<body>

<div class="header">Carian Maklumat Kubur Negeri Melaka</div>

<div class="searchbox">
<input type="text" id="searchNama" placeholder="Cari Nama Si Mati">
<select id="searchDaerah">
<option value="">Semua Daerah</option>
<option value="Melaka Tengah">Melaka Tengah</option>
<option value="Alor Gajah">Alor Gajah</option>
<option value="Jasin">Jasin</option>
</select>
</div>

<div id="resultCount"></div>

<table id="tableKubur" class="display">
<thead>
<tr>
<th>Nama</th>
<th>Tapak</th>
<th>No</th>
<th>Baris</th>
<th>Tarikh</th>
<th>Umur</th>
<th>Map</th>
<th>Daerah</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3 style="text-align:center;">Peta Lokasi Kubur</h3>
<!-- MAP STATIK TANPA API KEY -->
<div id="map">
<iframe 
    src="https://www.google.com/maps/d/embed?mid=1IurUoZemVe0Y6FIBNQnCRySCcS1lDRI" 
    width="100%" height="100%" style="border:0;"></iframe>
</div>

<script>
let table, allData=[];

// INIT TABLE
$(document).ready(function(){
table = $('#tableKubur').DataTable({
pageLength:20,
scrollY:"150px",
lengthChange:false,
info:false,
language:{ emptyTable:"Senarai akan dipaparkan sekiranya Nama Si Mati dicari" }
});

fetchData();
});

// FETCH DATA
function fetchData(){
let url="https://script.google.com/macros/s/AKfycbzmjtNM_Ae1SIbT0NrZz7aKZaz9K_d-luUD89SFnAdit4oM0MmLSIvkEoAzN32m5eVe/exec";

fetch(url)
.then(res=>res.json())
.then(data=>{
allData = data
.filter(r=>r && r[0] && r[0]!="Nama Si Mati")
.map(r=>{
let row=[];
for(let i=0;i<8;i++){
row[i]=r[i]?r[i].toString().trim():"";
}
return row;
});
});
}

// DISPLAY TABLE
function displayTable(data){
table.clear();

data.forEach(r=>{
let mapLink='';
if(r[6]){
let url=r[6].startsWith("http")?r[6]:"https://www.google.com/maps?q="+r[6];
mapLink=`<a class="mapbtn" href="${url}" target="_blank">Lihat</a>`;
}

table.row.add([r[0],r[1],r[2],r[3],r[4],r[5],mapLink,r[7]]);
});

table.draw();

// result count
let text="";
if(data.length>0){ text=data.length+" rekod dijumpai"; }
else if($('#searchNama').val()||$('#searchDaerah').val()){ text="Tiada rekod dijumpai"; }

$('#resultCount').text(text);
}

// SEARCH
let debounce;
function search(){
clearTimeout(debounce);
debounce=setTimeout(()=>{

let nama=$('#searchNama').val().toLowerCase();
let daerah=$('#searchDaerah').val();

let filtered=allData.filter(r=>{
return (!nama||r[0].toLowerCase().includes(nama)) &&
(!daerah||r[7]===daerah);
});

displayTable(filtered);

},300);
}

$('#searchNama').on('keyup',search);
$('#searchDaerah').on('change',search);

</script>

</body>
</html>
