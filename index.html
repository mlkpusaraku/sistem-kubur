<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carian Maklumat Kubur</title>
<!-- PapaParse untuk CSV -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #f4f4f4;
  font-size: 14px; /* tulisan lebih kecil */
}
h1 {
  text-align: center;
  color: #222;
  font-size: 20px; /* lebih kecil */
}
.controls {
  margin: 10px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
select, input {
  padding: 5px 8px;
  font-size: 14px; /* kecilkan */
  flex: 1;
  min-width: 180px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: #fff;
  font-size: 13px; /* kecilkan */
}
th, td {
  border: 1px solid #aaa;
  padding: 6px 8px;
  text-align: left;
}
th {
  background-color: #333;
  color: #fff;
  position: sticky;
  top: 0;
}
tr:nth-child(even) {
  background-color: #f2f2f2;
}
a {
  color: #1a73e8;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
/* Responsive untuk mobile */
@media(max-width: 768px){
  table, thead, tbody, th, td, tr {
    display: block;
  }
  th {
    top: auto;
  }
  tr {
    margin-bottom: 12px;
  }
  td {
    text-align: right;
    padding-left: 50%;
    position: relative;
  }
  td::before {
    content: attr(data-label);
    position: absolute;
    left: 10px;
    text-align: left;
    font-weight: bold;
  }
}
</style>
</head>
<body>

<h1>Carian Maklumat Kubur</h1>

<div class="controls">
  <select id="daerahSelect" onchange="filterKubur()">
    <option value="">-- Semua Daerah --</option>
  </select>
  <input type="text" id="searchInput" onkeyup="filterKubur()" placeholder="Carian Nama Tapak / Nama Si Mati...">
</div>

<table id="kuburTable">
  <thead>
    <tr>
      <th>NAMA SI MATI</th>
      <th>NAMA TAPAK KUBUR</th>
      <th>NOMBOR KUBUR</th>
      <th>BARIS / LAJUR</th>
      <th>TARIKH KEMATIAN</th>
      <th>UMUR</th>
      <th>LOKASI</th>
      <th>DAERAH</th>
    </tr>
  </thead>
  <tbody>
    <!-- Data auto generate dari CSV -->
  </tbody>
</table>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSs2iLNoW3nhQ7jxhzKAPbev6UPK99anfHiE7s6A9YP8Gg4cgVlKSq1Ycu3VDSe-PggQx26Z-QzG9V_/pub?gid=2066831020&single=true&output=csv";

let kuburData = [];

// Load CSV dengan PapaParse
Papa.parse(csvUrl, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    kuburData = results.data;
    populateDaerahDropdown();
    displayTable(kuburData);
  }
});

// Populate dropdown Daerah auto
function populateDaerahDropdown() {
  const select = document.getElementById('daerahSelect');
  const daerahSet = new Set(kuburData.map(r => (r["DAERAH"] || "").trim()).filter(d => d));
  daerahSet.forEach(d => {
    const option = document.createElement('option');
    option.value = d;
    option.textContent = d;
    select.appendChild(option);
  });
}

// Display table
function displayTable(data) {
  const tbody = document.querySelector("#kuburTable tbody");
  tbody.innerHTML = "";
  data.forEach(row => {
    const tr = document.createElement('tr');
    ["NAMA SI MATI","NAMA TAPAK KUBUR","NOMBOR KUBUR","BARIS / LAJUR","TARIKH KEMATIAN","UMUR","LOKASI","DAERAH"].forEach(col => {
      const td = document.createElement('td');
      td.setAttribute("data-label", col);
      const value = (row[col] || "").trim();
      if(col === "LOKASI" && value) {
        const a = document.createElement('a');
        a.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(value)}`;
        a.textContent = value;
        a.target = "_blank";
        td.appendChild(a);
      } else {
        td.textContent = value;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

// Filter function dengan partial search
function filterKubur() {
  const daerah = document.getElementById('daerahSelect').value.trim().toLowerCase();
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  const filtered = kuburData.filter(row => {
    const rowDaerah = (row["DAERAH"] || "").trim().toLowerCase();
    const rowNama = (row["NAMA SI MATI"] || "").trim().toLowerCase();
    const rowTapak = (row["NAMA TAPAK KUBUR"] || "").trim().toLowerCase();

    const matchDaerah = !daerah || rowDaerah === daerah;
    const matchSearch = !search || rowNama.includes(search) || rowTapak.includes(search);

    return matchDaerah && matchSearch;
  });

  displayTable(filtered);
}
</script>

</body>
</html>
