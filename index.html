<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carian Maklumat Kubur</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    select, input {
      padding: 6px 10px;
      margin: 5px 0;
      font-size: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: #fff;
    }
    th, td {
      border: 1px solid #aaa;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #333;
      color: #fff;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>

<h1>Carian Maklumat Kubur</h1>

<label for="daerahSelect">Pilih Daerah:</label>
<select id="daerahSelect" onchange="filterKubur()">
  <option value="">-- Semua Daerah --</option>
  <option value="Melaka Tengah">Melaka Tengah</option>
  <option value="Alor Gajah">Alor Gajah</option>
  <option value="Jasin">Jasin</option>
</select>

<label for="searchInput">Carian Nama Tapak Kubur / Nama Si Mati:</label>
<input type="text" id="searchInput" onkeyup="filterKubur()" placeholder="Taip nama...">

<table id="kuburTable">
  <thead>
    <tr>
      <th>Nama Tapak Kubur</th>
      <th>Nombor Kubur</th>
      <th>Nama Si Mati</th>
      <th>Tarikh Kematian</th>
      <th>Daerah</th>
    </tr>
  </thead>
  <tbody>
    <!-- Contoh data, ganti ikut data dari Google Sheets -->
    <tr>
      <td>Tapak A</td>
      <td>001</td>
      <td>Ali</td>
      <td>01/01/2020</td>
      <td>Melaka Tengah</td>
    </tr>
    <tr>
      <td>Tapak B</td>
      <td>002</td>
      <td>Abu</td>
      <td>02/02/2021</td>
      <td>Jasin</td>
    </tr>
    <tr>
      <td>Tapak C</td>
      <td>003</td>
      <td>Siti</td>
      <td>15/03/2022</td>
      <td>Alor Gajah</td>
    </tr>
    <!-- Tambah baris lain ikut database sebenar -->
  </tbody>
</table>

<script>
function filterKubur() {
  var daerah = document.getElementById('daerahSelect').value.toLowerCase();
  var search = document.getElementById('searchInput').value.toLowerCase();
  var table = document.getElementById('kuburTable');
  var tr = table.getElementsByTagName('tr');

  for (var i = 1; i < tr.length; i++) { // skip header
    var tdDaerah = tr[i].getElementsByTagName('td')[4];
    var tdNamaTapak = tr[i].getElementsByTagName('td')[0];
    var tdNamaMati = tr[i].getElementsByTagName('td')[2];

    var matchDaerah = tdDaerah && (daerah === "" || tdDaerah.textContent.toLowerCase() === daerah);
    var matchSearch = (tdNamaTapak && tdNamaTapak.textContent.toLowerCase().includes(search)) ||
                      (tdNamaMati && tdNamaMati.textContent.toLowerCase().includes(search));

    if (matchDaerah && matchSearch) {
      tr[i].style.display = "";
    } else {
      tr[i].style.display = "none";
    }
  }
}
</script>

</body>
</html>
