<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carian Maklumat Kubur</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    select, input {
      padding: 6px 10px;
      margin: 5px 0;
      font-size: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: #fff;
    }
    th, td {
      border: 1px solid #aaa;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #333;
      color: #fff;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>

<h1>Carian Maklumat Kubur</h1>

<label for="daerahSelect">Pilih Daerah:</label>
<select id="daerahSelect" onchange="filterKubur()">
  <option value="">-- Semua Daerah --</option>
</select>

<label for="searchInput">Carian Nama Tapak Kubur / Nama Si Mati:</label>
<input type="text" id="searchInput" onkeyup="filterKubur()" placeholder="Taip nama...">

<table id="kuburTable">
  <thead>
    <tr>
      <th>NAMA SI MATI</th>
      <th>NAMA TAPAK KUBUR</th>
      <th>NOMBOR KUBUR</th>
      <th>BARIS / LAJUR</th>
      <th>TARIKH KEMATIAN</th>
      <th>UMUR</th>
      <th>LOKASI</th>
      <th>DAERAH</th>
    </tr>
  </thead>
  <tbody>
    <!-- Data akan generate dari CSV -->
  </tbody>
</table>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSs2iLNoW3nhQ7jxhzKAPbev6UPK99anfHiE7s6A9YP8Gg4cgVlKSq1Ycu3VDSe-PggQx26Z-QzG9V_/pub?gid=2066831020&single=true&output=csv";

let kuburData = [];

async function loadCSV() {
  const res = await fetch(csvUrl);
  const data = await res.text();
  const rows = data.split("\n").slice(1); // skip header
  kuburData = rows.map(r => r.split(","));
  populateDaerahDropdown();
  displayTable(kuburData);
}

function populateDaerahDropdown() {
  const select = document.getElementById('daerahSelect');
  const daerahSet = new Set(kuburData.map(r => r[7]).filter(d => d)); // lajur 8 = Daerah
  daerahSet.forEach(d => {
    const option = document.createElement('option');
    option.value = d;
    option.textContent = d;
    select.appendChild(option);
  });
}

function displayTable(data) {
  const tbody = document.querySelector("#kuburTable tbody");
  tbody.innerHTML = "";
  data.forEach(row => {
    const tr = document.createElement('tr');
    row.forEach(cell => {
      const td = document.createElement('td');
      td.textContent = cell;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function filterKubur() {
  const daerah = document.getElementById('daerahSelect').value.toLowerCase();
  const search = document.getElementById('searchInput').value.toLowerCase();

  const filtered = kuburData.filter(row => {
    const matchDaerah = !daerah || (row[7] && row[7].toLowerCase() === daerah);
    const matchSearch = (row[0] && row[0].toLowerCase().includes(search)) || 
                        (row[1] && row[1].toLowerCase().includes(search));
    return matchDaerah && matchSearch;
  });
  displayTable(filtered);
}

loadCSV();
</script>

</body>
</html>
