<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Carian Maklumat Kubur Negeri Melaka</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/charts/loader.js"></script>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<style>
body{
  font-family:Arial;
  font-size:13px;
  background:#f4f6f8;
  margin:0;
}
.header{
  background:#0d3b66;
  color:white;
  text-align:center;
  padding:12px;
  font-size:16px;
  font-weight:bold;
}
.searchbox{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  padding:10px;
  background:white;
}
input,select{
  padding:6px;
  border:1px solid #ccc;
  border-radius:5px;
  width:180px;
}
#tableWrapper{
  width:95%;
  margin:10px auto;
  max-height:300px;
  overflow:auto;
  border:1px solid #ccc;
  border-radius:8px;
  background:white;
}
table{
  width:100%;
  font-size:12px;
}
th{
  background:#0d3b66;
  color:white;
}
td{
  padding:6px;
}
.mapbtn{
  background:#0d3b66;
  color:white;
  padding:4px 8px;
  border-radius:4px;
  text-decoration:none;
  font-size:11px;
}
.bottomBox{
  text-align:center;
  margin-top:10px;
  padding:10px;
}
#chart_div{
  height:200px;
  width:100%;
}
#totalKubur{
  font-weight:bold;
  color:#0d3b66;
  margin-bottom:10px;
}
.dataTables_wrapper{
  font-size:11px;
}
#tableKubur_filter{
  display:none;
}
@media(max-width:600px){
  .header{ font-size:14px; }
  input,select{ width:100%; }
  table{ font-size:11px; }
  .mapbtn{ padding:3px 6px; font-size:10px; }
}
</style>
</head>

<body>

<div class="header">Carian Maklumat Kubur Negeri Melaka</div>

<div class="searchbox">
  <input type="text" id="searchNama" placeholder="Nama Si Mati">
  <select id="searchDaerah">
    <option value="">Semua Daerah</option>
    <option>Melaka Tengah</option>
    <option>Alor Gajah</option>
    <option>Jasin</option>
  </select>
</div>

<div id="tableWrapper">
<table id="tableKubur">
<thead>
<tr>
<th>Nama</th>
<th>Tapak</th>
<th>No</th>
<th>Baris</th>
<th>Tarikh</th>
<th>Umur</th>
<th>Map</th>
<th>Daerah</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="bottomBox">
<div id="totalKubur"></div>
<div id="chart_div"></div>
</div>

<script>
google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(fetchData);

let allData=[], table;

// ✅ URL AWAK (NEW)
let url="https://script.google.com/macros/s/AKfycbx3EtpLWuKVI524sjcWv8_6iBLXeEylBI6zGfaBAgIQgogtSbitvJotxBmGvBrhyFfH/exec";

function fetchData(){
  fetch(url)
  .then(res=>res.json())
  .then(data=>{
    allData=data;
    initTable();
    updateChart();
  })
  .catch(err=>console.error('Ralat fetch data:',err));
}

function initTable(){
  table = $('#tableKubur').DataTable({
    destroy:true,
    pageLength:10,
    lengthChange:false,
    responsive:true
  });
  display(allData);
}

function display(data){
  table.clear();
  data.forEach(r=>{
    let map='';
    if(r[6]){
      let urlMap="https://www.google.com/maps?q="+encodeURIComponent(r[6]);
      map=`<a class="mapbtn" href="${urlMap}" target="_blank">Map</a>`;
    }
    table.row.add([
      r[0]||'',
      r[1]||'',
      r[2]||'',
      r[3]||'',
      r[4]||'',
      r[5]||'',
      map,
      r[7]||''
    ]);
  });
  table.draw();
}

function updateChart(){
  let counts={};
  allData.forEach(r=>{
    let d=r[7]||"Tiada";
    counts[d]=(counts[d]||0)+1;
  });

  let data=[['Daerah','Jumlah']];
  for(let d in counts) data.push([d,counts[d]]);

  let chart=new google.visualization.ColumnChart(document.getElementById('chart_div'));
  chart.draw(google.visualization.arrayToDataTable(data),{
    legend:'none',
    width:'100%',
    height:200
  });

  document.getElementById('totalKubur').innerText="Jumlah Kubur: "+allData.length;
}

function filterData(){
  let val=document.getElementById("searchNama").value.toLowerCase();
  let daerah=document.getElementById("searchDaerah").value;

  let filtered=allData.filter(r=>{
    return (!val || (r[0]||'').toLowerCase().includes(val)) &&
           (!daerah || r[7]==daerah);
  });

  display(filtered);
}

document.getElementById("searchNama").addEventListener("keyup",filterData);
document.getElementById("searchDaerah").addEventListener("change",filterData);
window.addEventListener('resize', updateChart);
</script>

</body>
</html>
