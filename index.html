<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carian Maklumat Kubur Negeri Melaka</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#444;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.searchbox{
background:white;
padding:15px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

input,select{
padding:8px;
margin:5px;
width:220px;
border:1px solid #ccc;
border-radius:4px;
}

table{
border-collapse:collapse;
width:95%;
margin:20px auto;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:14px;
}

th{
background:#666;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

.maplink{
color:blue;
font-weight:bold;
text-decoration:none;
}

.maplink:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="header">
Carian Maklumat Kubur Negeri Melaka
</div>

<div class="searchbox">

<input type="text" id="searchNama" placeholder="Taip Nama Si Mati">

<select id="searchDaerah">
<option value="">Semua Daerah</option>
<option>Melaka Tengah</option>
<option>Alor Gajah</option>
<option>Jasin</option>
</select>

</div>

<table id="tableKubur">

<thead>
<tr>
<th>Nama Si Mati</th>
<th>Nama Tapak Kubur</th>
<th>Nombor Kubur</th>
<th>Baris / Lajur</th>
<th>Tarikh Kematian</th>
<th>Umur</th>
<th>Lokasi Kubur</th>
<th>Daerah</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

function displayData(data){

let tbody=document.querySelector("#tableKubur tbody");

tbody.innerHTML="";

data.forEach(function(r){

let map=`<a class="maplink" href="${r[6]}" target="_blank">Lihat Map</a>`;

let row=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
<td>${r[5]}</td>
<td>${map}</td>
<td>${r[7]}</td>
</tr>
`;

tbody.innerHTML+=row;

});

}

function searchData(){

let nama=document.getElementById("searchNama").value;
let daerah=document.getElementById("searchDaerah").value;

let url="https://script.google.com/macros/s/AKfycbyOnYdL5Z2CKCs_Rra0vAZVY9uH9hnWfevcG0TjLl958JCKXWLJOk5zON4BkHas1Wya/exec?nama="+nama+"&daerah="+daerah;

fetch(url)
.then(res=>res.json())
.then(data=>{

displayData(data);

});

}

document.getElementById("searchNama").addEventListener("keyup",searchData);
document.getElementById("searchDaerah").addEventListener("change",searchData);

</script>

</body>
</html>
