<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carian Maklumat Kubur Negeri Melaka</title>

<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<style>
body{
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
    font-size: 13px;
}
.header{
    background: #0d3b66;
    color: white;
    padding: 12px;
    font-size: 18px;
    text-align: center;
}
.searchbox{
    background: white;
    padding: 12px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}
input, select{
    padding: 6px;
    margin: 4px;
    width: 200px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
}
table{
    border-collapse: collapse;
    width: 95%;
    margin: 20px auto;
    background: white;
    font-size: 12px;
}
th{
    background: #0d3b66;
    color: white;
    font-size: 12px;
    text-align: left;
    padding: 8px;
}
td{
    font-size: 12px;
    padding: 8px;
}
tbody tr:nth-child(odd){ background: #f0f0f0; }
tbody tr:nth-child(even){ background: #ffffff; }
tbody tr:hover{ background: #d0e1f9 !important; cursor: pointer; }

.maplink{
    color: #0d3b66;
    font-weight: bold;
    text-decoration: none;
    font-size: 12px;
}
.dataTables_wrapper .dataTables_filter { display: none; }
.dataTables_wrapper .dataTables_length select { font-size: 13px !important; height: 25px !important; }
.dataTables_wrapper .dataTables_paginate button { font-size: 12px !important; }

.dataTables_scrollBody { max-height: 350px; overflow-y: scroll; }

#mymap{
    width: 95%;
    height: 500px;
    margin: 30px auto;
    border: 2px solid #0d3b66;
    border-radius: 6px;
}

#totalKubur{
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #0d3b66;
    margin: 10px 0;  
}

#chart_div{
    width: 95%;
    height: 200px;
    margin: 0 auto;
}
</style>
</head>

<body>

<div class="header">Carian Maklumat Kubur Negeri Melaka</div>

<!-- Jumlah keseluruhan kubur -->
<div id="totalKubur">Loading…</div>

<!-- Bar chart mini -->
<div id="chart_div"></div>

<div class="searchbox">
<input type="text" id="searchNama" placeholder="Taip Nama Si Mati">
<select id="searchDaerah">
<option value="">Semua Daerah</option>
<option>Melaka Tengah</option>
<option>Alor Gajah</option>
<option>Jasin</option>
</select>
</div>

<table id="tableKubur" class="display">
<thead>
<tr>
<th>Nama Si Mati</th>
<th>Nama Tapak Kubur</th>
<th>Nombor Kubur</th>
<th>Baris / Lajur</th>
<th>Tarikh Kematian</th>
<th>Umur</th>
<th>Lokasi Kubur</th>
<th>Daerah</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3 style="text-align:center; margin-top:40px;">Lokasi Kubur (My Map)</h3>
<div id="mymap">
  <iframe src="https://www.google.com/maps/d/embed?mid=1IurUoZemVe0Y6FIBNQnCRySCcS1lDRI" width="100%" height="100%" style="border:0;"></iframe>
</div>

<script type="text/javascript">
google.charts.load('current', {'packages':['corechart']});
let table, allData = [];

function updateChart(){
    let counts = {'Melaka Tengah':0,'Alor Gajah':0,'Jasin':0};
    allData.forEach(r=>{
        if(counts[r[7]]!==undefined){ counts[r[7]]+=1; }
    });
    let dataArray = [['Daerah','Jumlah']];
    for(let d in counts){ dataArray.push([d, counts[d]]); }
    let data = google.visualization.arrayToDataTable(dataArray);
    let options = {
        title: 'Jumlah Kubur Mengikut Daerah',
        colors: ['#0d3b66'],
        legend: {position:'none'},
        hAxis: {title:'Daerah'},
        vAxis: {title:'Jumlah'}
    };
    let chart = new google.visualization.ColumnChart(document.getElementById('chart_div'));
    chart.draw(data, options);
}

function displayData(data){
    allData = data;
    table.clear();
    data.forEach(function(r){
        let map='<a class="maplink" href="#mymap">📍 Lihat Lokasi</a>';
        table.row.add([ r[0], r[1], r[2], r[3], r[4], r[5], map, r[7] ]);
    });
    table.draw();
    document.getElementById('totalKubur').innerText = allData.length;
    updateChart();
}

$(document).ready(function(){
    table = $('#tableKubur').DataTable({
        pageLength: 25,
        scrollY: "350px",
        scrollCollapse: true,
        scroller: true,
        deferRender: true
    });
});

function searchData(){
    let nama=document.getElementById("searchNama").value;
    let daerah=document.getElementById("searchDaerah").value;
    let url="https://script.google.com/macros/s/AKfycbyOnYdL5Z2CKCs_Rra0vAZVY9uH9hnWfevcG0TjLl958JCKXWLJOk5zON4BkHas1Wya/exec?nama="+nama+"&daerah="+daerah;
    fetch(url)
    .then(res=>res.json())
    .then(data=>{
        displayData(data);
    });
}

document.getElementById("searchNama").addEventListener("keyup",searchData);
document.getElementById("searchDaerah").addEventListener("change",searchData);

$(document).on('click', '.maplink', function(e){
    e.preventDefault();
    $('html, body').animate({ scrollTop: $("#mymap").offset().top }, 800);
});
</script>

</body>
</html>
