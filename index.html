<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carian Maklumat Kubur Negeri Melaka</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<!-- FIXED HEADER -->
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body { font-family: Arial; background:#f4f6f8; margin:0; font-size:12px; }
.header { background:#0d3b66; color:white; padding:10px; text-align:center; font-size:16px; }
.searchbox { background:white; padding:10px; text-align:center; margin:10px auto; width:95%; }
.searchbox input, .searchbox select { padding:6px; font-size:12px; }
#resultCount { width:95%; margin:auto; font-weight:bold; color:#0d3b66; margin-bottom:10px;}
table { width:95%; margin:10px auto; font-size:11px; }
th { background:#0d3b66; color:white; }
.mapbtn { background:#0d3b66; color:white; padding:3px 6px; border-radius:4px; text-decoration:none; }

.namaKlik { color:#0d3b66; font-weight:bold; cursor:pointer; }
.namaKlik:hover { text-decoration: underline; color:#e63946; }

#map { width:95%; height:400px; margin:20px auto; border:2px solid #0d3b66; }
#chart_div { width:95%; height:150px; margin:20px auto; }
#totalKubur { width:95%; margin:auto; font-weight:bold; color:#0d3b66; font-size:15px; text-align:center; margin-bottom:10px;}
.dataTables_empty { text-align:center !important; color:#666; }
</style>
</head>

<body>

<div class="header">Carian Maklumat Kubur Negeri Melaka</div>

<div class="searchbox">
<input type="text" id="searchNama" placeholder="Cari Nama Si Mati">
<select id="searchDaerah">
<option value="">Semua Daerah</option>
<option value="Melaka Tengah">Melaka Tengah</option>
<option value="Alor Gajah">Alor Gajah</option>
<option value="Jasin">Jasin</option>
</select>
</div>

<div id="resultCount"></div>

<table id="tableKubur" class="display">
<thead>
<tr>
<th>Nama</th>
<th>Tapak</th>
<th>No</th>
<th>Baris</th>
<th>Tarikh</th>
<th>Umur</th>
<th>Map</th>
<th>Daerah</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3 style="text-align:center;">Peta Lokasi Kubur</h3>
<div id="map">
<iframe id="mapFrame"
src="https://www.google.com/maps/d/embed?mid=1IurUoZemVe0Y6FIBNQnCRySCcS1lDRI"
width="100%" height="100%" style="border:0;"></iframe>
</div>

<div id="totalKubur"></div>

<h3 style="text-align:center;">Carta Jumlah Kubur Mengikut Daerah</h3>
<div id="chart_div"></div>

<script>
google.charts.load('current', {'packages':['corechart']});
let table, allData=[];

// INIT TABLE
$(document).ready(function(){
table = $('#tableKubur').DataTable({
pageLength:20,
fixedHeader:true,
lengthChange:false,
info:false,
language:{ emptyTable:"Senarai akan dipaparkan sekiranya Nama Si Mati dicari" }
});

fetchData();
});

// FETCH DATA
function fetchData(){
let url="https://script.google.com/macros/s/AKfycbzmjtNM_Ae1SIbT0NrZz7aKZaz9K_d-luUD89SFnAdit4oM0MmLSIvkEoAzN32m5eVe/exec";

fetch(url)
.then(res=>res.json())
.then(data=>{
allData = data
.filter(r=>r && r[0] && r[0]!="Nama Si Mati")
.map(r=>{
let row=[];
for(let i=0;i<8;i++){
row[i]=r[i]?r[i].toString().trim():"";
}
return row;
});
updateTotalKubur();
updateChart();
});
}

// DISPLAY TABLE
function displayTable(data){
table.clear();

data.forEach(r=>{
let mapLink='';
if(r[6]){
let url=r[6].startsWith("http")?r[6]:"https://www.google.com/maps?q="+r[6];
mapLink=`<a class="mapbtn" href="${url}" target="_blank">Lihat</a>`;
}

table.row.add([
`<span class="namaKlik" data-lokasi="${r[6]}">${r[0]}</span>`,
r[1],
r[2],
r[3],
r[4],
r[5],
mapLink,
r[7]
]);
});

table.draw();

let text="";
if(data.length>0){ text=data.length+" rekod dijumpai"; }
else if($('#searchNama').val()||$('#searchDaerah').val()){ text="Tiada rekod dijumpai"; }
$('#resultCount').text(text);

updateChart(data);
}

// CLICK NAMA → MAP
$(document).on('click', '.namaKlik', function(){

let lokasi = $(this).data('lokasi');

if(lokasi){
let url = lokasi.startsWith("http") 
? lokasi 
: "https://www.google.com/maps?q=" + lokasi;

$('#mapFrame').attr('src', url);

$('html, body').animate({
scrollTop: $('#map').offset().top
}, 500);
}

});

// SEARCH
let debounce;
function search(){
clearTimeout(debounce);
debounce=setTimeout(()=>{
let nama=$('#searchNama').val().toLowerCase();
let daerah=$('#searchDaerah').val();
let filtered=allData.filter(r=>{
return (!nama||r[0].toLowerCase().includes(nama)) &&
(!daerah||r[7]===daerah);
});
displayTable(filtered);
},300);
}

$('#searchNama').on('keyup',search);
$('#searchDaerah').on('change',search);

// TOTAL
function updateTotalKubur(){
let total = allData.length;
$('#totalKubur').text("Jumlah keseluruhan kubur di Melaka: "+total);
}

// CHART
function updateChart(filteredData){
let dataToUse = filteredData || allData;

let counts = {'Melaka Tengah':0,'Alor Gajah':0,'Jasin':0};
dataToUse.forEach(r=>{
if(r[7] && counts[r[7]]!==undefined) counts[r[7]]++;
});

let chartData=[['Daerah','Jumlah']];
for(let d in counts) chartData.push([d, counts[d]]);

let chart = new google.visualization.ColumnChart(document.getElementById('chart_div'));
chart.draw(google.visualization.arrayToDataTable(chartData), {colors:['#0d3b66'], legend:'none'});
}
</script>

</body>
</html>
